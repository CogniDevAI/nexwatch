name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  HUB_IMAGE: ghcr.io/cognidevai/nexwatch-hub
  AGENT_IMAGE: ghcr.io/cognidevai/nexwatch-agent

jobs:
  build-binaries:
    name: Build Binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Build UI
        working-directory: ui
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Download Go modules
        run: go mod download

      - name: Build hub
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          go build -ldflags="-s -w -X main.version=${VERSION}" \
            -o nexwatch-hub ./cmd/hub

      - name: Build agent
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          go build -ldflags="-s -w -X main.version=${VERSION}" \
            -o nexwatch-agent ./cmd/agent

      - name: Package hub
        run: |
          tar -czf nexwatch-hub_${GITHUB_REF_NAME#v}_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz nexwatch-hub
          sha256sum nexwatch-hub_${GITHUB_REF_NAME#v}_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz > nexwatch-hub_${GITHUB_REF_NAME#v}_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz.sha256

      - name: Package agent
        run: |
          tar -czf nexwatch-agent_${GITHUB_REF_NAME#v}_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz nexwatch-agent
          sha256sum nexwatch-agent_${GITHUB_REF_NAME#v}_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz > nexwatch-agent_${GITHUB_REF_NAME#v}_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz.sha256

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            nexwatch-hub_*.tar.gz
            nexwatch-hub_*.tar.gz.sha256
            nexwatch-agent_*.tar.gz
            nexwatch-agent_*.tar.gz.sha256

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build-binaries
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/nexwatch-hub_*.tar.gz
            dist/nexwatch-hub_*.tar.gz.sha256
            dist/nexwatch-agent_*.tar.gz
            dist/nexwatch-agent_*.tar.gz.sha256

  docker:
    name: Docker Images
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push Hub image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.hub
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.HUB_IMAGE }}:${{ steps.version.outputs.version }}
            ${{ env.HUB_IMAGE }}:latest
          build-args: |
            VERSION=${{ steps.version.outputs.version }}

      - name: Build and push Agent image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.agent
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.AGENT_IMAGE }}:${{ steps.version.outputs.version }}
            ${{ env.AGENT_IMAGE }}:latest
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
