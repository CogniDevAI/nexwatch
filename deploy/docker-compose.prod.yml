services:
  # ── NexWatch Hub ──────────────────────────────────────────────────────────────
  hub:
    image: ghcr.io/cognidevai/nexwatch-hub:latest
    restart: unless-stopped
    environment:
      - TZ=${TZ:-America/Guayaquil}
    volumes:
      - nexwatch-data:/app/pb_data
    expose:
      - "8090"
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8090/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── Nginx reverse proxy + SSL ─────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot-certs:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot:ro
    networks:
      - internal
    depends_on:
      - hub

  # ── Certbot (Let's Encrypt) ────────────────────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    restart: unless-stopped
    volumes:
      - certbot-certs:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    # Renew every 12 hours, only acts when cert is near expiry
    entrypoint: >
      sh -c "trap exit TERM;
             while :; do
               certbot renew --webroot -w /var/www/certbot --quiet;
               sleep 12h & wait $${!};
             done"

volumes:
  nexwatch-data:
  certbot-certs:
  certbot-www:

networks:
  internal:
    driver: bridge
