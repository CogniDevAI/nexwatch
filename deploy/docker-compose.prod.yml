services:
  hub:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.hub
    image: nexwatch-hub:local
    restart: unless-stopped
    environment:
      - TZ=${TZ:-America/Guayaquil}
    ports:
      - "${HUB_PORT:-8090}:8090"
    volumes:
      - nexwatch-data:/app/pb_data

volumes:
  nexwatch-data:
